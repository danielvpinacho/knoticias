<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title x-text="post ? post.titulo + ' — KNOTICIAS' : 'KNOTICIAS'">KNOTICIAS</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700&family=Manrope:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body x-data="postPage()" x-init="init()">

<header class="site-header">
  <div class="wrap">
    <div>
      <a href="index.html" class="logo">K<span class="logo-accent">NOTICIAS</span></a>
      <p class="tagline">Kpop &amp; cultura pop en México</p>
    </div>
  </div>
</header>

<main class="wrap">

  <template x-if="loading">
    <p class="empty-state" style="padding-top:3rem;">Cargando nota…</p>
  </template>

  <template x-if="!loading && !post">
    <div class="post-header">
      <a href="index.html" class="back-link">← Volver al listado</a>
      <h1 class="post-title">No encontramos esa nota</h1>
      <p style="color:var(--text-muted)">Puede que el enlace esté mal escrito o la nota ya no exista.</p>
    </div>
  </template>

  <template x-if="!loading && post">
    <div :style="`--cat-color:${catColor(post.categoria)}`">
      <div class="post-header">
        <a href="index.html" class="back-link">← Volver al listado</a>
        <span class="post-cat" x-text="catLabel(post.categoria)"></span>
        <h1 class="post-title" x-text="post.titulo"></h1>
        <div class="post-meta-row">
          <span x-text="'🗓️ ' + formatDate(post.fecha)"></span>
          <span x-text="'📍 ' + post.ubicacion"></span>
        </div>
      </div>

      <article class="post-body" x-html="renderedContent"></article>

      <div class="post-tags" style="margin-bottom:3rem;">
        <template x-for="tag in post.tags" :key="tag">
          <span class="tag" x-text="tag"></span>
        </template>
      </div>
    </div>
  </template>

</main>

<footer class="site-footer">
  <div class="wrap">
    KNOTICIAS — sitio estático, sin backend. Notas almacenadas en <code>data/posts/</code>.
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="js/app.js"></script>
<script src="js/post.js"></script>
</body>
</html>
