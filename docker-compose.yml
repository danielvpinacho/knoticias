version: '3.9'
services:
  web:
    image: nginx:stable-alpine
    ports:
      - '80:80'
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./assets/css:/usr/share/nginx/html/assets/css:ro
      - ./assets/js:/usr/share/nginx/html/assets/js:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-knoticias}
      - POSTGRES_USER=${POSTGRES_USER:-knoticias}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-knoticias}
    volumes:
      - db-data:/var/lib/postgresql/data

volumes:
  db-data:
