<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KNOTICIAS — Noticias de K-pop y cultura pop en México</title>
<meta name="description" content="Noticias, conciertos, entrevistas, presentaciones de marca, teatro y cultura pop coreana en CDMX y México.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700&family=Manrope:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body x-data="blog()" x-init="init()">

<header class="site-header">
  <div class="wrap">
    <div>
      <a href="index.html" class="logo">K<span class="logo-accent">NOTICIAS</span></a>
      <p class="tagline">Kpop &amp; cultura pop en México</p>
    </div>
  </div>
</header>

<div class="ticker" aria-hidden="true">
  <div class="ticker-track">
    <template x-for="p in [...upcoming(), ...upcoming()]">
      <span x-text="`${formatDate(p.fecha)} — ${p.titulo}`"></span>
    </template>
  </div>
</div>

<main class="wrap">

  <div class="filters-bar">
    <button class="chip" :class="{active: categoria === 'todos'}" @click="categoria = 'todos'">Todos</button>
    <template x-for="cat in categorias" :key="cat.id">
      <button class="chip"
              :class="{active: categoria === cat.id}"
              :style="categoria === cat.id ? `--chip-color:${cat.color}` : ''"
              @click="categoria = cat.id"
              x-text="cat.label">
      </button>
    </template>
    <input class="search-input" type="search" placeholder="Buscar nota…" x-model="query">
  </div>

  <section class="ticket-grid">
    <template x-for="post in filtered()" :key="post.id">
      <a class="ticket" :href="`post.html?id=${post.id}`" :style="`--cat-color:${catColor(post.categoria)}`">
        <div class="ticket-top">
          <div class="ticket-meta">
            <span class="ticket-cat" x-text="catLabel(post.categoria)"></span>
            <span class="ticket-date" x-text="formatDate(post.fecha)"></span>
          </div>
          <h2 class="ticket-title" x-text="post.titulo"></h2>
          <p class="ticket-location" x-text="'📍 ' + post.ubicacion"></p>
        </div>
        <div class="ticket-perf"></div>
        <div class="ticket-bottom">
          <p class="ticket-summary" x-text="post.resumen"></p>
          <div class="ticket-tags">
            <template x-for="tag in post.tags" :key="tag">
              <span class="tag" x-text="tag"></span>
            </template>
          </div>
          <span class="ticket-link">Leer nota →</span>
        </div>
      </a>
    </template>

    <p class="empty-state" x-show="filtered().length === 0">
      No hay notas que coincidan con tu búsqueda todavía.
    </p>
  </section>

</main>

<footer class="site-footer">
  <div class="wrap">
    KNOTICIAS — sitio estático, sin backend. Notas almacenadas en <code>data/posts/</code>.
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="js/app.js"></script>
</body>
</html>
